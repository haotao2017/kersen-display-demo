<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#050816" />
    <title>Kersen Display Offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #050816;
        color: #edf7ff;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background:
          radial-gradient(circle at 20% 0%, rgba(94, 231, 255, 0.18), transparent 24rem),
          radial-gradient(circle at 80% 10%, rgba(168, 85, 247, 0.2), transparent 24rem),
          #050816;
      }

      main {
        width: min(90vw, 520px);
        padding: 2rem;
        border: 1px solid rgba(94, 231, 255, 0.2);
        border-radius: 28px;
        background: rgba(13, 21, 46, 0.84);
        box-shadow: 0 0 30px rgba(94, 231, 255, 0.18);
        text-align: center;
      }

      span {
        color: #5ee7ff;
        font-size: 0.74rem;
        font-weight: 900;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0.8rem 0;
        font-size: clamp(2rem, 8vw, 3.4rem);
        line-height: 0.98;
        letter-spacing: -0.06em;
      }

      p {
        margin: 0;
        color: #90a4c8;
        line-height: 1.8;
      }
    </style>
  </head>
  <body>
    <main>
      <span>Offline Mode</span>
      <h1>当前网络不可用</h1>
      <p>请检查网络连接。已经访问过的静态资源会继续可用，页面内容将在恢复联网后刷新。</p>
    </main>
  </body>
</html>
